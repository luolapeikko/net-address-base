version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/packages/net-address"
      - "/packages/net-socket-address"
      - "/packages/unix-socket-address"
    schedule:
      interval: "weekly"
    allow:
      - dependency-name: "*"
        dependency-type: "production"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]